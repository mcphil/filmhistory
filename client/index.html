      "mainEntity": [
        {"@type":"Question","name":"Wann wurde der Film erfunden?","acceptedAnswer":{"@type":"Answer","text":"Es gibt keinen einzelnen Erfindungsmoment. Die Grundlagen wurden über Jahrzehnte gelegt: Die Camera Obscura war seit der Antike bekannt. 1832 entwickelte Joseph Plateau das Phénakistiskop. 1878 fotografierte Eadweard Muybridge ein galoppierendes Pferd mit 24 Kameras. 1891 meldete Thomas Edison das Kinetoskop zum Patent an. Den Durchbruch als öffentliches Medium schafften die Gebrüder Lumière am 28. Dezember 1895 mit der ersten kommerziellen Filmvorführung im Grand Café in Paris."}},
        {"@type":"Question","name":"Wann begann die Ära des Tonfilms?","acceptedAnswer":{"@type":"Answer","text":"Der Tonfilm begann offiziell am 6. Oktober 1927 mit 'The Jazz Singer' von Alan Crosland. Al Jolson sprach darin den legendären Satz: 'Wait a minute, wait a minute, you ain't heard nothin' yet!' Bis 1930 hatten die meisten großen Studios auf Tonfilm umgestellt."}},
        {"@type":"Question","name":"Wann wurde Farbfilm eingeführt?","acceptedAnswer":{"@type":"Answer","text":"Das erste praktikable Farbfilmsystem war Technicolor, das ab 1922 eingesetzt wurde. Der Durchbruch kam 1939 mit 'Vom Winde verweht' und 'Der Zauberer von Oz'. Kodak Eastmancolor (1950) machte Farbfilm erschwinglich, sodass er ab Mitte der 1950er Jahre zum Standard wurde."}},
        {"@type":"Question","name":"Was ist die Nouvelle Vague?","acceptedAnswer":{"@type":"Answer","text":"Die Nouvelle Vague war eine französische Filmbewegung der späten 1950er und 1960er Jahre, angeführt von Jean-Luc Godard, François Truffaut und Claude Chabrol. Sie lehnten Studiokonventionen ab, drehten mit kleinen Crews auf den Straßen von Paris und behandelten den Regisseur als 'Auteur' – als eigentlichen Autor des Films."}},
        {"@type":"Question","name":"Wann begann die Ära der Computeranimation (CGI) im Film?","acceptedAnswer":{"@type":"Answer","text":"Die ersten CGI-Sequenzen im Kinofilm erschienen 1973 in 'Westworld'. Den eigentlichen Durchbruch markierte 'Jurassic Park' (1993), wo photoreale CGI-Dinosaurier erstmals überzeugend mit echten Schauspielern interagierten. 'Toy Story' (1995) war der erste vollständig computeranimierte Spielfilm."}},
        {"@type":"Question","name":"Was ist der Steadicam?","acceptedAnswer":{"@type":"Answer","text":"Die Steadicam wurde 1975 von Garrett Brown erfunden. Es ist ein mechanisches Stabilisierungssystem, das die Kamera vom Körper des Kameramanns entkoppelt und trotzdem frei beweglich hält. Stanley Kubrick nutzte sie für die berühmten Flur-Fahrten in 'The Shining' (1980)."}},
        {"@type":"Question","name":"Was ist New Hollywood?","acceptedAnswer":{"@type":"Answer","text":"New Hollywood (ca. 1967–1980) war eine Bewegung junger amerikanischer Regisseure, die das alte Studiosystem aufbrachen. Francis Ford Coppola, Martin Scorsese, Steven Spielberg und George Lucas schufen ein neues amerikanisches Kino. Schlüsselfilme: 'Bonnie und Clyde' (1967), 'Der Pate' (1972), 'Taxi Driver' (1976)."}},
        {"@type":"Question","name":"Wie hat KI die Filmproduktion verändert?","acceptedAnswer":{"@type":"Answer","text":"KI hat die Filmproduktion bereits verändert: De-Aging von Schauspielern ('The Irishman', 2019), Stimmenklonen, automatisiertes Colorgrading, KI-gestützte Schnittvorschläge und Virtual Production mit LED-Walls. 2024 erschütterte OpenAIs Sora die Branche. Gleichzeitig führten KI-Bedenken zu den großen Hollywood-Streiks von 2023 (SAG-AFTRA, WGA)."}},
        {"@type":"Question","name":"Was ist die Kuleschow-Wirkung?","acceptedAnswer":{"@type":"Answer","text":"Der sowjetische Filmtheoretiker Lew Kuleschow zeigte in den frühen 1920er Jahren: Dasselbe neutrale Gesicht eines Schauspielers, geschnitten mit einem Suppenteller, einem Sarg oder einem spielenden Kind, wurde als hungrig, traurig oder glücklich interpretiert. Bedeutung im Film entsteht nicht durch einzelne Bilder, sondern durch ihre Kombination."}},
        {"@type":"Question","name":"Wann wurde der analoge Film durch digitale Technik abgelöst?","acceptedAnswer":{"@type":"Answer","text":"Der Übergang verlief graduell über etwa 15 Jahre. 'Star Wars Episode I' (1999) war der erste große Film, der teilweise digital gedreht wurde. Bis 2012 hatten die meisten Kinos weltweit auf digitale Projektion umgestellt."}}
      ]
